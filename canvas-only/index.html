<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Effekseer WebGPU Canvas Only</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #050505;
        color: #d7d7d7;
        font-family: Consolas, "Courier New", monospace;
      }

      #viewer-canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        background: #050505;
      }

      #hud {
        position: fixed;
        left: 12px;
        top: 12px;
        padding: 8px 10px;
        background: rgba(0, 0, 0, 0.72);
        border: 1px solid #252525;
        font-size: 12px;
        line-height: 1.45;
        white-space: pre-wrap;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <canvas id="viewer-canvas"></canvas>
    <div id="hud">Init...</div>
    <script src="/effekseer-runtime/fflate.umd.js"></script>
    <script src="/effekseer-runtime/Effekseer_WebGPU_Runtime.js"></script>
    <script src="/effekseer-runtime/effekseer.webgpu.src.js"></script>
    <script>
      if (typeof effekseer !== 'undefined') {
        window.effekseer = effekseer
      }
    </script>
    <script type="module" src="/src/canvas-only-main.ts"></script>
  </body>
</html>
