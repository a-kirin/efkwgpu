<!doctype html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Effekseer WebGL Canvas Only Test</title>
  <style>
    body {
      margin: 12px;
      font-family: Arial, sans-serif;
      background: #dbe2ea;
    }
    #canvas {
      background: #dbe2ea;
      border: 1px solid #b7c0ca;
    }
    #status {
      margin-top: 8px;
      color: #1b5e20;
    }
    #error {
      margin-top: 6px;
      color: #b71c1c;
      white-space: pre-wrap;
    }
    #log {
      margin-top: 8px;
      padding: 6px 8px;
      border: 1px solid #c8d0d9;
      background: #f4f6f9;
      color: #111;
      font-family: Consolas, monospace;
      font-size: 12px;
      max-height: 220px;
      overflow: auto;
      white-space: pre-wrap;
    }
    #cpu-panel {
      margin-top: 10px;
      width: 440px;
      padding: 8px 10px;
      background: #0f1720;
      color: #dce6f0;
      border: 1px solid #1f2a36;
      border-radius: 6px;
      font-family: Consolas, monospace;
      font-size: 12px;
    }
    #cpu-label {
      margin-bottom: 6px;
    }
    #cpu-chart {
      width: 420px;
      height: 140px;
      background: #0a1118;
      border: 1px solid #1f2a36;
      display: block;
    }
  </style>
</head>
<body>
  <canvas id="canvas" width="1280" height="720" class="screen" oncontextmenu="event.preventDefault()"></canvas>
  <br>
  <div id="buttons">
    <input type="button" onclick="effekseer && effekseer.stopAll && effekseer.stopAll(); latestHandle = null;" value="stop" id="stop"></input>
    <input type="button" onclick="callExists();" value="exists?"></input>
    <input type="button" onclick="callEstimateBoundingBox();" value="callEstimateBoundingBox"></input>
    <input type="button" onclick="window.step(5);" value="step" id="step"></input>
  </div>
  <div id="status"></div>
  <div id="error"></div>
  <div id="log"></div>
  <div id="cpu-panel">
    <div id="cpu-label">CPU Usage: -- us</div>
    <canvas id="cpu-chart" width="420" height="140"></canvas>
  </div>

  <script src="/effekseer-webgl/effekseer.js"></script>
  <script>
    if (typeof effekseer !== 'undefined') {
      window.effekseer = effekseer
    }
  </script>
  <script type="module" src="./index_webgl.js"></script>
</body>
</html>
